<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff4d6d);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Card */
.card-box {
  width: 92%;
  max-width: 420px;
  padding: 24px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(14px);
  text-align: center;
  position: relative;
}

/* Buttons row */
.btn-row {
  display: flex;
  gap: 14px;
  margin-top: 20px;
}

/* Buttons (same size always) */
.btn-love {
  flex: 1;
  height: 48px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-love:active {
  transform: scale(0.92);
}

/* Yes button */
#yesBtn {
  background: white;
  color: #ff4d6d;
  font-weight: 600;
}

/* No button (cleaner look) */
#noBtn {
  background: rgba(255,255,255,0.85);
  color: #ff4d6d;
  font-weight: 500;
}

/* Message */
#message {
  display: none;
  margin-top: 16px;
}

/* Letter */
.love-text {
  display: none;
  margin-top: 16px;
  max-height: 220px;
  overflow-y: auto;
  text-align: left;
  line-height: 1.6;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  white-space: pre-line;
  font-size: 14px;
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -20px;
  animation: floatUp linear infinite;
  pointer-events: none;
}

@keyframes floatUp {
  100% {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card-box">
  <h2>Happy Birthday Meenamma 🎉💖</h2>
  <h3>By clicking yes, you agree to be mine forever 💕</h3>

  <div class="btn-row">
    <button id="yesBtn" class="btn-love">Yes 💖</button>
    <button id="noBtn" class="btn-love">No 😜</button>
  </div>

  <div id="message">I knew it 😌💖 You love me soooo much ❤️</div>
  <div id="letter" class="love-text"></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const card = document.querySelector(".card-box");
const letterBox = document.getElementById("letter");

let index = 0;

/* TEXT */
const text = `Happy birthday meenammaaaaaa🥳❤️
... (your full text stays here unchanged) ...`;

/* typing */
function typeText() {
  if (index < text.length) {
    letterBox.innerHTML += text.charAt(index);
    index++;
    letterBox.scrollTop = letterBox.scrollHeight;
    setTimeout(typeText, 10);
  }
}

/* YES */
yesBtn.addEventListener("click", () => {
  document.getElementById("message").style.display = "block";
  letterBox.style.display = "block";
  noBtn.style.display = "none";

  letterBox.innerHTML = "";
  index = 0;
  typeText();
});

/* 🔥 move on click (but keep layout intact) */
noBtn.addEventListener("click", (e) => {
  e.preventDefault();

  const rect = card.getBoundingClientRect();
  const yesRect = yesBtn.getBoundingClientRect();

  let x, y, safe = false;
  const padding = 20;

  while (!safe) {
    x = Math.random() * (rect.width - noBtn.offsetWidth);
    y = Math.random() * (rect.height - noBtn.offsetHeight);

    const noRect = {
      left: x + rect.left,
      right: x + rect.left + noBtn.offsetWidth,
      top: y + rect.top,
      bottom: y + rect.top + noBtn.offsetHeight
    };

    const overlap =
      !(noRect.right < yesRect.left - padding ||
        noRect.left > yesRect.right + padding ||
        noRect.bottom < yesRect.top - padding ||
        noRect.top > yesRect.bottom + padding);

    if (!overlap) safe = true;
  }

  /* temporarily float */
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* ❤️ more hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (14 + Math.random() * 18) + "px";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
